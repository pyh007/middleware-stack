services:
  backup-init:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-9.4.3-arm64}
    user: "0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /usr/share/elasticsearch/backup && chown -R 1000:0 /usr/share/elasticsearch/backup"]
    volumes:
      - es-study-backup:/usr/share/elasticsearch/backup

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-9.4.3-arm64}
    container_name: es-study-single
    stop_grace_period: 1m
    depends_on:
      backup-init:
        condition: service_completed_successfully
    environment:
      discovery.type: single-node
      cluster.name: es-study-single
      node.name: es-study-single
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.license.self_generated.type: basic
      ELASTIC_PASSWORD: ${ES_PASSWORD:-elastic-local-123}
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      path.repo: /usr/share/elasticsearch/backup
      cluster.routing.allocation.disk.watermark.low: ${ES_DISK_WATERMARK_LOW:-1536mb}
      cluster.routing.allocation.disk.watermark.high: ${ES_DISK_WATERMARK_HIGH:-1gb}
      cluster.routing.allocation.disk.watermark.flood_stage: ${ES_DISK_WATERMARK_FLOOD_STAGE:-512mb}
      indices.merge.disk.watermark.high: ${ES_MERGE_DISK_WATERMARK_HIGH:-512mb}
      _JAVA_OPTIONS: -XX:UseSVE=0
    ports:
      - "127.0.0.1:${ES_PORT:-9200}:9200"
    volumes:
      - es-study-data:/usr/share/elasticsearch/data
      - es-study-backup:/usr/share/elasticsearch/backup
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -u elastic:$${ELASTIC_PASSWORD}
          http://127.0.0.1:9200/_cluster/health >/dev/null
      interval: 5s
      timeout: 5s
      retries: 60

  kibana-setup:
    profiles: ["kibana"]
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-9.4.3-arm64}
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: ${ES_PASSWORD:-elastic-local-123}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-kibana-local-123}
    restart: "no"
    command: >-
      bash -ec '
        deadline=$$(($$(date +%s) + 60));
        until response=$$(curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X POST http://elasticsearch:9200/_security/user/kibana_system/_password -H "Content-Type: application/json" -d "{\"password\":\"$${KIBANA_SYSTEM_PASSWORD}\"}"); do
          if [ $$(date +%s) -ge $$deadline ]; then
            echo "设置 kibana_system 密码超时" >&2;
            exit 1;
          fi;
          sleep 2;
        done;
        test "$$response" = "{}";
      '

  kibana:
    profiles: ["kibana"]
    image: docker.elastic.co/kibana/kibana:${ES_VERSION:-9.4.3-arm64}
    container_name: es-study-kibana
    stop_grace_period: 1m
    depends_on:
      kibana-setup:
        condition: service_completed_successfully
    environment:
      SERVER_NAME: es-study-kibana
      SERVER_PUBLICBASEURL: http://localhost:${KIBANA_PORT:-5601}
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-kibana-local-123}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-local-kibana-encryption-key-32-chars}
      XPACK_SECURITY_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-local-kibana-encryption-key-32-chars}
      XPACK_REPORTING_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-local-kibana-encryption-key-32-chars}
    ports:
      - "127.0.0.1:${KIBANA_PORT:-5601}:5601"
    volumes:
      - es-study-kibana:/usr/share/kibana/data
      - ./config/telemetry.yml:/usr/share/kibana/config/telemetry.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 60

volumes:
  es-study-data:
  es-study-backup:
  es-study-kibana:
