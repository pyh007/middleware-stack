# ConfigMap 属于 Kubernetes 核心 API 组，因此使用 v1。
apiVersion: v1

# ConfigMap 用于保存非敏感配置。它不会运行容器，只负责向 Pod 提供配置数据；
# 密码、Token 等敏感信息应放入 Secret，而不是 ConfigMap。
kind: ConfigMap

# metadata 用来唯一标识这个 Kubernetes 资源。
metadata:
  # StatefulSet 会通过这个名称引用 ConfigMap；同一 Namespace 内名称必须唯一。
  name: kafka-config

# data 中的每个键值最终通过 StatefulSet 的 envFrom 注入 Kafka 容器环境变量。
# ConfigMap 的值必须是字符串，所以数字和布尔值也需要使用引号。
data:
  # 单节点 KRaft：同一个 Kafka 进程同时承担 broker 和 controller 角色。
  # NODE_ID 是节点在 Kafka 集群内的唯一编号，多节点部署时不能重复。
  KAFKA_NODE_ID: "1"
  # broker 负责消息读写，controller 负责管理集群元数据和选举。
  KAFKA_PROCESS_ROLES: "broker,controller"

  # INTERNAL 供集群内应用使用，EXTERNAL 供 kubectl port-forward 使用，
  # CONTROLLER 只用于 KRaft controller 通信。
  # LISTENERS 决定 Kafka 进程实际监听哪些本地端口；格式为 名称://地址:端口。
  KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
  # ADVERTISED_LISTENERS 是 Kafka 返回给客户端的可访问地址。
  # 内部客户端使用 Service DNS；宿主机通过端口转发后使用 localhost:19092。
  # INTERNAL 使用 publishNotReadyAddresses 的 Headless Pod DNS，避免 readiness
  # 尚未成功时普通 Service 没有可用 Endpoint，形成“必须 Ready 才能 Ready”的闭环。
  KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-0.kafka-headless.middleware-stack.svc.cluster.local:29092,EXTERNAL://localhost:19092"
  # 为每个监听器指定安全协议。PLAINTEXT 没有加密和认证，仅适合本地学习环境。
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
  # Broker 之间的数据复制和内部通信使用 INTERNAL 监听器。
  KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
  # KRaft Controller 之间通信使用 CONTROLLER 监听器。
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  # StatefulSet Pod 具有稳定名称 kafka-0；Headless Service 为它提供稳定 DNS。
  # 格式为 node-id@host:port；多 Controller 时用逗号列出所有投票节点。
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-0.kafka-headless.middleware-stack.svc.cluster.local:9093"

  # 单 Broker 学习环境的内部 Topic 只能使用一个副本。
  # __consumer_offsets 保存消费者组已提交的 Offset。
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  # 下面两项控制事务状态内部 Topic 的副本数和最小同步副本数。
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  # 新消费者加入后立即触发分区分配，减少本地学习时的等待时间。
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
  # 自动创建 Topic 时默认使用三个分区；分区决定并行消费能力。
  KAFKA_NUM_PARTITIONS: "3"
  # 客户端访问不存在的 Topic 时允许 Kafka 自动创建它。
  # 生产环境通常建议关闭，并由管理员显式创建 Topic。
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # 此目录由 StatefulSet 的 PVC 挂载，Pod 重建后数据仍然存在。
  KAFKA_LOG_DIRS: "/var/lib/kafka/data"
  # 设置 Kafka JVM 的初始和最大堆内存，这里都限制为 512 MiB。
  KAFKA_HEAP_OPTS: "-Xms512m -Xmx512m"
