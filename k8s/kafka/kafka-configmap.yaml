apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
data:
  # 单节点 KRaft：同一个 Kafka 进程同时承担 broker 和 controller 角色。
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: "broker,controller"

  # INTERNAL 供集群内应用使用，EXTERNAL 供 kubectl port-forward 使用，
  # CONTROLLER 只用于 KRaft controller 通信。
  KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
  KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka.middleware-stack.svc.cluster.local:29092,EXTERNAL://localhost:19092"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  # StatefulSet Pod 具有稳定名称 kafka-0；Headless Service 为它提供稳定 DNS。
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-0.kafka-headless.middleware-stack.svc.cluster.local:9093"

  # 单 Broker 学习环境的内部 Topic 只能使用一个副本。
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
  KAFKA_NUM_PARTITIONS: "3"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # 此目录由 StatefulSet 的 PVC 挂载，Pod 重建后数据仍然存在。
  KAFKA_LOG_DIRS: "/var/lib/kafka/data"
  KAFKA_HEAP_OPTS: "-Xms512m -Xmx512m"
