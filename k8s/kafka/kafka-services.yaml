# Headless Service 不提供负载均衡，而是给 StatefulSet Pod 创建稳定 DNS。
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  labels:
    app.kubernetes.io/name: kafka
spec:
  clusterIP: None
  # Kafka controller 必须在 Pod Ready 前即可通过稳定 DNS 相互发现。
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: internal
      port: 29092
      targetPort: internal
    - name: controller
      port: 9093
      targetPort: controller
---
# 普通 ClusterIP Service 为集群内客户端提供一个稳定入口。
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: kafka
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: external
      port: 9092
      targetPort: external
    - name: internal
      port: 29092
      targetPort: internal
