# 使用 Kubernetes 核心 API 组的 v1 版本。
# Namespace 属于核心资源，因此写作 v1，而不是 apps/v1。
apiVersion: v1

# 声明当前 YAML 要创建的资源类型。
# Namespace 用于在同一个 Kubernetes 集群中对资源进行逻辑分组。
kind: Namespace

# metadata 保存资源的标识信息，例如名称、标签和注解。
metadata:
  # Namespace 的名称。之后可以通过 -n middleware-stack 指定它，
  # 例如：kubectl get pods -n middleware-stack。
  name: middleware-stack

  # labels 是可查询、可筛选的键值对，不会直接改变 Namespace 的运行行为。
  # 例如：kubectl get namespace -l purpose=learning。
  labels:
    # app.kubernetes.io/part-of 是 Kubernetes 推荐使用的标准 Label。
    # 它表示该资源属于哪个更大的应用或系统；这里表示这个 Namespace
    # 以及其中的 Kafka、后续 Redis、MySQL 等都属于 middleware-stack 项目。
    app.kubernetes.io/part-of: middleware-stack

    # purpose 不是 Kubernetes 内置字段，而是本项目自定义的 Label。
    # learning 表示该 Namespace 用于学习，方便与测试、生产环境进行区分。
    purpose: learning
