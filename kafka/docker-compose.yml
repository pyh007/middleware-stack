services:
  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka
    hostname: kafka
    ports:
      # 宿主机访问 Kafka 用 localhost:9092
      - "9092:9092"
    environment:
      # KRaft 单节点模式：broker + controller 放在一个进程里
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # 三类监听：
      # INTERNAL：Docker 网络内部访问，例如 kafka-ui -> kafka
      # EXTERNAL：宿主机访问，例如本机 Java/Go/Python 程序 -> localhost:9092
      # CONTROLLER：KRaft controller 内部通信
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      # Broker 之间通信使用 INTERNAL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # KRaft controller 配置
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # 单节点必须设置为 1，否则内部 topic 副本数不满足会报错
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 本地开发常用配置
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # 官方镜像预先创建并授权给 appuser(uid=1000) 的数据目录
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      # Docker 命名卷：Topic 消息、Offset 和 KRaft 元数据均由 Docker 管理
      # 挂载到镜像预设目录，首次创建卷时会继承正确的 1000:0 权限
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      # 浏览器访问 http://localhost:8080
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      # 注意：容器内部访问 Kafka，不能用 localhost:9092，要用 kafka:29092
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

volumes:
  # down 时保留数据；down -v 时删除命名卷及其中的 Kafka 数据
  kafka_data:
