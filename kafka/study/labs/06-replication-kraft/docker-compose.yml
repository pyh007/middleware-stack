x-kafka-common: &kafka-common
  image: apache/kafka:4.3.1
  restart: "no"
  environment: &kafka-environment
    CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9093,3@broker3:9093
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_LOG_DIRS: /var/lib/kafka/data
  healthcheck:
    test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 >/dev/null 2>&1"]
    interval: 5s
    timeout: 5s
    retries: 24
    start_period: 15s

services:
  broker1:
    <<: *kafka-common
    hostname: broker1
    ports:
      - "127.0.0.1:19092:9092"
    environment:
      <<: *kafka-environment
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker1:29092,EXTERNAL://localhost:19092
    volumes:
      - broker1_data:/var/lib/kafka/data

  broker2:
    <<: *kafka-common
    hostname: broker2
    ports:
      - "127.0.0.1:19093:9092"
    environment:
      <<: *kafka-environment
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker2:29092,EXTERNAL://localhost:19093
    volumes:
      - broker2_data:/var/lib/kafka/data

  broker3:
    <<: *kafka-common
    hostname: broker3
    ports:
      - "127.0.0.1:19094:9092"
    environment:
      <<: *kafka-environment
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker3:29092,EXTERNAL://localhost:19094
    volumes:
      - broker3_data:/var/lib/kafka/data

volumes:
  broker1_data:
  broker2_data:
  broker3_data:
